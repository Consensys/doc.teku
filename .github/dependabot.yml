version: 2

updates:
  # Docusaurus + npm deps
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    # wait 7 days for stability      
    cooldown:
      default-days: 7
    groups:
      docusaurus:
        patterns:
          - "@docusaurus/*"
      react:
        patterns:
          - "react*"
      others:
        patterns:
          - "*"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
