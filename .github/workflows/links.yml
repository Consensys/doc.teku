---
name: Check for broken links

on:
  pull_request:
    branches:
      - main

jobs:

  linkCheck:
    name: Link Checking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: LinkCheck
        uses: ConsenSys/github-actions/docs-link-check@0fd1cb88921d5907ff2e348c5aa759196a053380 # main
        with:
          CONFIG_FILE: .linkspector.yml
