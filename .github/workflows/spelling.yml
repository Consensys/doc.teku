---
name: Check for spelling with vale

on:
  pull_request:
    branches:
      - main

jobs:
  vale:
    name: Spelling
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Vale
        uses: Consensys/github-actions/docs-spelling-check@0fd1cb88921d5907ff2e348c5aa759196a053380 # main
