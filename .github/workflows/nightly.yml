---
  name: Nightly check

  on:
    schedule:
      - cron: "0 0 * * *"
    workflow_dispatch: {}

  concurrency:
    group: nightly-${{ github.ref }}
    cancel-in-progress: true

  jobs:
    linkCheck:
      name: Run link check
      runs-on: ubuntu-latest
      permissions:
        contents: read
      steps:
        - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        - name: LinkCheck
          id: linkcheck
          uses: umbrelladocs/action-linkspector@37c85bcde51b30bf929936502bac6bfb7e8f0a4d # v1
          with:
            reporter: github-check
            fail_level: error
            config_file: .linkspector.yml

    slackNotification:
      needs: linkCheck
      if: ${{ failure() }}
      runs-on: ubuntu-latest
      steps:
        - name: Slack Notification
          uses: ConsenSys/github-actions/slack-notify@60d442d6d385b414c8e00eb049a85f56f9fd7be7 # main
          with:
            SLACK_CHANNEL: doc-ci-alerts
            SLACK_COLOR: danger
            SLACK_TITLE: Teku docs nightly build - Failure
            SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
            MSG_MINIMAL: true
