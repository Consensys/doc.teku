---
  name: Nightly check

  on:
    schedule:
      - cron: "0 0 * * *"
    workflow_dispatch: {}

  concurrency:
    group: nightly-${{ github.ref }}
    cancel-in-progress: true

  jobs:
    linkCheck:
      name: Run link check
      runs-on: ubuntu-latest
      permissions:
        contents: read
      steps:
        - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        - name: LinkCheck
          id: linkcheck
          uses: umbrelladocs/action-linkspector@37c85bcde51b30bf929936502bac6bfb7e8f0a4d # v1
          with:
            reporter: github-check
            fail_level: error
            config_file: .linkspector.yml

    slackNotification:
      needs: linkCheck
      if: ${{ failure() }}
      runs-on: ubuntu-latest
      steps:
        - name: Slack Notification
          uses: ConsenSys/github-actions/slack-notify@7256f3d39c7bb71ec4ca9fc6078991302d4c8650 # main
          with:
            SLACK_CHANNEL: doc-ci-alerts
            SLACK_COLOR: danger
            SLACK_TITLE: Teku docs nightly build - Failure
            SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
            MSG_MINIMAL: true
