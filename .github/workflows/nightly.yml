---
  name: Nightly check

  on:
    schedule:
      - cron: "0 0 * * *"
    workflow_dispatch: {}

  concurrency:
    group: nightly-${{ github.ref }}
    cancel-in-progress: true

  jobs:
    linkCheck:
      name: Run link check
      runs-on: ubuntu-latest
      permissions:
        contents: read
      steps:
        - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        - name: LinkCheck
          id: linkcheck
          uses: umbrelladocs/action-linkspector@963b6264d7de32c904942a70b488d3407453049e # v1
          with:
            reporter: github-check
            fail_level: error
            config_file: .linkspector.yml

    slackNotification:
      needs: linkCheck
      if: ${{ failure() }}
      runs-on: ubuntu-latest
      steps:
        - name: Slack Notification
          uses: ConsenSys/github-actions/slack-notify@0fd1cb88921d5907ff2e348c5aa759196a053380 # main
          with:
            SLACK_CHANNEL: doc-ci-alerts
            SLACK_COLOR: danger
            SLACK_TITLE: Teku docs nightly build - Failure
            SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
            MSG_MINIMAL: true
