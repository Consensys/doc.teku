---
name: trivy-cache-db

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"      

jobs:
  trivy:
    name: Run trivy scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Trivy Cache
        uses: ConsenSys/github-actions/trivy-update-cache@0fd1cb88921d5907ff2e348c5aa759196a053380 # main
