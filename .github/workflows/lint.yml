---
name: Check for lint errors

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint 
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Lint code
        uses: ConsenSys/github-actions/docs-lint-all@13686f2a2d5238304e9399bddd1ef02b0cfe45ee # main

      - name: Lint markdown
        uses: ConsenSys/github-actions/docs-lint-markdown@13686f2a2d5238304e9399bddd1ef02b0cfe45ee # main
